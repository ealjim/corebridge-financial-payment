<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Statements</title>
  <style>
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background:#0b0f1a;
      color:#eaf0ff;
      padding: 24px;
    }
    .wrap{
      max-width: 900px;
      margin: 0 auto;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 18px;
    }
    a{
      color:#7c5cff;
      text-decoration:none;
      font-weight:700;
    }
    a:hover{ text-decoration:underline; }
    h1{ margin: 6px 0 10px; font-size: 22px; }
    .sub{ color: rgba(234,240,255,.75); font-size: 13px; }
    .list{
      margin-top: 14px;
      display:flex;
      flex-direction:column;
      gap: 10px;
    }
    .item{
      padding: 12px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.10);
      display:flex;
      justify-content:space-between;
      gap: 10px;
      align-items:center;
    }
    .tag{
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(124,92,255,.15);
      border: 1px solid rgba(124,92,255,.35);
      font-size: 12px;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="index.html">← Back to dashboard</a>
    <h1>Access statements</h1>
    <div class="sub">Demo page. Replace with your real statement links or embedded document viewer.</div>

    <div class="list">
      <div class="item">
        <div>Statement • January 2026</div>
        <div class="tag">PDF</div>
      </div>
      <div class="item">
        <div>Statement • December 2025</div>
        <div class="tag">PDF</div>
      </div>
      <div class="item">
        <div>Statement • November 2025</div>
        <div class="tag">PDF</div>
      </div>
    </div>
  </div>
</body>
</html>
