<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Corebridge Financial - Beneficiary Update</title>
  <style>
    :root {
      --bg: #03081d;
      --panel-border: rgba(255, 255, 255, 0.08);
      --purple: #6c1dff;
      --purple-text: #8b5cff;
      --mint: #58d2be;
      --text: #ffffff;
      --muted: #d8ddef;
      --button-dark: #2a2f40;
      --button-dark-border: rgba(255, 255, 255, 0.08);
      --input-bg: rgba(255, 255, 255, 0.04);
      --input-border: rgba(255, 255, 255, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .top-bar {
      background: linear-gradient(90deg, #5b14e6 0%, #6c1dff 100%);
      height: 76px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
    }

    .logo-img {
      height: 40px;
      object-fit: contain;
    }

    .page {
      max-width: 1160px;
      margin: 0 auto;
      padding: 36px 34px 70px;
    }

    .notice {
      margin: 0 0 28px;
      font-size: 20px;
      line-height: 1.45;
      font-weight: 700;
      color: var(--text);
      max-width: 980px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.02) 100%);
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      padding: 26px 24px 28px;
      min-height: 360px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
    }

    .card-title {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 22px;
      font-weight: 700;
    }

    .section-title {
      margin: 20px 0 12px;
      color: var(--purple-text);
      font-size: 18px;
      font-weight: 700;
    }

    .section-title:first-of-type {
      margin-top: 0;
    }

    .detail,
    .field-group {
      margin-bottom: 14px;
    }

    .label {
      display: block;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .value {
      font-size: 16px;
      line-height: 1.45;
      font-weight: 700;
      color: var(--text);
    }

    input {
      width: 100%;
      height: 44px;
      border-radius: 12px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text);
      padding: 0 14px;
      font-size: 15px;
      outline: none;
    }

    input::placeholder {
      color: rgba(216, 221, 239, 0.45);
    }

    input:focus {
      border-color: var(--purple-text);
      box-shadow: 0 0 0 3px rgba(139, 92, 255, 0.12);
    }

    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      margin: 18px 0;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .btn {
      min-width: 142px;
      height: 50px;
      border-radius: 14px;
      border: 1px solid transparent;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-cancel {
      background: var(--button-dark);
      border-color: var(--button-dark-border);
      color: var(--text);
    }

    .btn-submit {
      background: var(--mint);
      color: #000000;
      box-shadow: 0 10px 24px rgba(88, 210, 190, 0.18);
    }

    @media (max-width: 820px) {
      .page {
        padding: 28px 20px 48px;
      }

      .cards {
        grid-template-columns: 1fr;
      }

      .card {
        min-height: auto;
      }

      .notice {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <header class="top-bar">
    <img src="corebridge-logo.png" alt="Corebridge Financial" class="logo-img" />
  </header>

  <main class="page">
    <p class="notice">Beneficiary changes made over the phone will be pended until a signed confirmation is receved.</p>

    <section class="cards" aria-label="Beneficiary details">
      <article class="card">
        <h1 class="card-title">Current Beneficiaries</h1>

        <div class="section-title">Primary</div>
