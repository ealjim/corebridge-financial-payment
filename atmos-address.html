<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Address Change</title>

<style>
:root{
  --bg:#f2f4f7; /* light gray background */
  --text:#1a1a1a;
  --muted:#6b7280;
  --line:rgba(0,0,0,.10);
  --brand:#3366CC; /* Atmos blue */
  --success:#21c7a8;
  --radius:18px;
  --shadow:0 8px 24px rgba(0,0,0,.08);
}

body{
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto;
  background:var(--bg);
  color:var(--text);
}

/* ===== Header ===== */
.top-banner{
  background:var(--brand);
  padding:18px 0;
  display:flex;
  justify-content:center;
  align-items:center;
}

.top-banner img{
  height:42px;
  object-fit:contain;
}

/* ===== Page Container ===== */
.frame{
  max-width:1000px;
  margin:0 auto;
  padding:30px 24px 120px;
}

h1{
  font-size:24px;
  margin-bottom:20px;
}

.status{
  font-size:18px;
  font-weight:800;
  margin-bottom:25px;
  color:var(--brand);
}

/* ===== Address Cards ===== */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
  margin-bottom:30px;
}

.card{
  background:#ffffff;
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:24px;
  box-shadow:var(--shadow);
}

.card h3{
  margin-top:0;
  margin-bottom:18px;
  font-size:16px;
  font-weight:800;
  color:var(--muted);
}

.address-line{
  margin-bottom:8px;
  font-weight:600;
}

/* ===== Buttons ===== */
.button-row{
  display:flex;
  gap:30px;
  justify-content:center;
}

.btn{
  padding:14px 40px;
  border-radius:14px;
  font-weight:800;
  border:none;
  cursor:pointer;
  font-size:15px;
  transition:all .2s ease;
}

.cancel{
  background:#e5e7eb;
  color:#111;
}

.cancel:hover{
  background:#d1d5db;
}

.confirm{
  background:var(--brand);
  color:#fff;
}

.confirm:hover{
  background:#254eda;
}

/* ===== Bottom Nav ===== */
.bottomNav{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  background:#ffffff;
  border-top:1px solid var(--line);
  padding:12px;
}

.navRow{
  max-width:1000px;
  margin:0 auto;
  display:flex;
  justify-content:space-between;
}

.navItem{
  color:var(--muted);
  text-decoration:none;
  font-size:13px;
  font-weight:700;
}

.navItem:hover{
  color:var(--brand);
}

/* ===== Responsive ===== */
@media (max-width:768px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<!-- Atmos Header -->
<div class="top-banner">
  <img src="Atmos Logo.png" alt="Atmos Logo">
</div>

<div class="frame">

  <h1>Address Update</h1>

  <div class="status">In progress...</div>

  <div class="grid">
    <div class="card">
      <h3>Old Address</h3>
      <div class="address-line">219 Liberty Ave.</div>
      <div class="address-line">St. Johns, FL</div>
      <div class="address-line">32259</div>
    </div>

    <div class="card">
      <h3>New Address</h3>
      <div class="address-line">2102 Auburn Rd.</div>
      <div class="address-line">Indianapolis, IN</div>
      <div class="address-line">46077</div>
    </div>
  </div>

  <div class="button-row">
    <button class="btn cancel" onclick="alert('Address change canceled')">
      Cancel
    </button>

    <button class="btn confirm" onclick="alert('Address change confirmed')">
      Confirm
    </button>
  </div>

</div>

<!-- Bottom Navigation -->
<div class="bottomNav">
  <div class="navRow">
    <a class="navItem" href="index.html">Dashboard</a>
    <a class="navItem" href="statements.html">Statements</a>
    <a class="navItem" href="#">Support</a>
  </div>
</div>

</body>
</html>
